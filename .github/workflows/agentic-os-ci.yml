name: Agentic OS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    name: Lint & Validate Documentation
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Vérification des fichiers requis..."
          for file in README.md ARCHITECTURE.md CLAUDE.md AGENTS.md MEMORY.md OPERATING_MANUAL.md SECURITY_AND_GUARDRAILS.md OBSERVABILITY.md AUTOMATION_N8N.md SKILLS_INDEX.md CONTEXT_INDEX.md .env.example; do
            if [ -f "$file" ]; then
              echo "OK: $file"
            else
              echo "MANQUANT: $file"
              exit 1
            fi
          done

      - name: Check required scripts exist
        run: |
          echo "Vérification des scripts..."
          for script in scripts/bootstrap.sh scripts/healthcheck.sh scripts/update_skills.sh; do
            if [ -f "$script" ]; then
              echo "OK: $script"
            else
              echo "MANQUANT: $script"
              exit 1
            fi
          done

      - name: Check required directories exist
        run: |
          echo "Vérification des dossiers..."
          for dir in scripts n8n/workflows n8n/docs skills docs/diagrams docs/runbooks docs/templates memory/storage memory/viewer; do
            if [ -d "$dir" ]; then
              echo "OK: $dir"
            else
              echo "MANQUANT: $dir"
              exit 1
            fi
          done
